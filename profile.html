<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الملف الشخصي - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="profile">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in grid gap-5 lg:grid-cols-[340px_1fr]">
      <aside class="alm-panel p-6 text-center">
        <span class="mx-auto grid h-24 w-24 place-items-center rounded-3xl bg-[var(--alm-green-800)] text-4xl font-black text-white">م</span>
        <h1 class="mt-5 text-2xl font-black">محمود أحمد</h1>
        <p class="text-[var(--alm-muted)]">طالب - مسار جزء عم</p>
        <div class="mt-6 alm-progress"><span style="width:73%"></span></div>
      </aside>
      <form class="alm-panel p-6">
        <h2 class="text-2xl font-black">بيانات الحساب</h2>
        <div class="mt-6 grid gap-4 md:grid-cols-2">
          <label><span class="text-sm font-bold">الاسم</span><input class="alm-input mt-2" value="محمود أحمد" /></label>
          <label><span class="text-sm font-bold">البريد</span><input class="alm-input mt-2" value="student@alminhaj.com" /></label>
          <label><span class="text-sm font-bold">المدينة</span><input class="alm-input mt-2" value="القاهرة" /></label>
          <label><span class="text-sm font-bold">اللغة</span><select class="alm-input mt-2"><option>العربية</option><option>English</option></select></label>
        </div>
        <button type="button" class="alm-btn alm-btn-primary mt-6" data-toast="تم تحديث الملف الشخصي">حفظ التغييرات</button>
      </form>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'student', title:'الملف الشخصي', subtitle:'Profile'});</script>
</body>
</html>
