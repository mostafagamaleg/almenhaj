<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استعادة كلمة المرور - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <main class="grid min-h-screen place-items-center px-4 py-8">
    <form class="alm-panel w-full max-w-md p-7">
      <a href="index.html" class="mb-8 flex items-center gap-3">
        <span class="grid h-11 w-11 place-items-center rounded-xl bg-[var(--alm-green-900)] text-[var(--alm-gold-300)]"><i data-lucide="book-open-text"></i></span>
        <b class="text-xl">المنهاج</b>
      </a>
      <span class="alm-badge gold">Account Recovery</span>
      <h1 class="mt-4 text-3xl font-black">استعادة كلمة المرور</h1>
      <p class="mt-2 text-sm leading-7 text-[var(--alm-muted)]">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>
      <label class="mt-6 block text-sm font-extrabold">البريد الإلكتروني</label>
      <input class="alm-input mt-2" type="email" placeholder="name@example.com" />
      <button class="alm-btn alm-btn-primary mt-6 w-full" type="button" data-toast="تم إرسال رابط الاستعادة إلى بريدك الإلكتروني">إرسال رابط الاستعادة</button>
      <a href="login.html" class="alm-btn alm-btn-secondary mt-3 w-full">العودة لتسجيل الدخول</a>
    </form>
  </main>
  <script src="js/navigation.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
