<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الشيخ - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="teacher">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in">
      <div class="mb-6 grid gap-4 md:grid-cols-4">
        <div class="alm-card p-5"><span class="text-sm text-[var(--alm-muted)]">عدد الطلاب</span><b class="mt-3 block text-3xl">430</b></div>
        <div class="alm-card p-5"><span class="text-sm text-[var(--alm-muted)]">دروس الأسبوع</span><b class="mt-3 block text-3xl">28</b></div>
        <div class="alm-card p-5"><span class="text-sm text-[var(--alm-muted)]">متوسط النجاح</span><b class="mt-3 block text-3xl">81%</b></div>
        <div class="alm-card p-5"><span class="text-sm text-[var(--alm-muted)]">تقييم الطلاب</span><b class="mt-3 block text-3xl">4.8</b></div>
      </div>
      <div class="grid gap-5 xl:grid-cols-[1fr_360px]">
        <div class="alm-panel p-6">
          <div class="mb-5 flex items-center justify-between">
            <h2 class="text-2xl font-black">طلاب المسار</h2>
            <a class="alm-btn alm-btn-primary" href="upload.html"><i data-lucide="upload-cloud" class="h-5 w-5"></i> رفع درس جديد</a>
          </div>
          <div class="alm-table-wrap">
            <table class="alm-table">
              <thead><tr><th>الطالب</th><th>التقدم</th><th>آخر اختبار</th><th>الحالة</th></tr></thead>
              <tbody>
                <tr><td>محمد علي</td><td>95%</td><td>ممتاز</td><td><span class="alm-badge">نشط</span></td></tr>
                <tr><td>أحمد خالد</td><td>93%</td><td>ممتاز</td><td><span class="alm-badge">نشط</span></td></tr>
                <tr><td>عمر سمير</td><td>92%</td><td>جيد جداً</td><td><span class="alm-badge">نشط</span></td></tr>
                <tr><td>أحمد حسن</td><td>45%</td><td>يحتاج مراجعة</td><td><span class="alm-badge gold">متابعة</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <aside class="space-y-5">
          <div class="alm-panel p-5">
            <h3 class="text-xl font-black">إجراءات سريعة</h3>
            <div class="mt-4 grid gap-3">
              <button class="alm-btn alm-btn-secondary justify-start" data-toast="تم إنشاء واجب جديد"><i data-lucide="clipboard-plus"></i> إنشاء واجب</button>
              <button class="alm-btn alm-btn-secondary justify-start" data-toast="تمت جدولة اختبار"><i data-lucide="calendar-plus"></i> جدولة اختبار</button>
              <button class="alm-btn alm-btn-secondary justify-start"><i data-lucide="message-square"></i> إرسال تنبيه</button>
            </div>
          </div>
          <div class="alm-panel p-5">
            <h3 class="text-xl font-black">طلاب يحتاجون متابعة</h3>
            <div class="mt-4 space-y-3">
              <div class="flex justify-between rounded-xl bg-white p-3"><span>أحمد حسن</span><b class="text-[var(--alm-warning)]">45%</b></div>
              <div class="flex justify-between rounded-xl bg-white p-3"><span>محمد إبراهيم</span><b class="text-[var(--alm-warning)]">48%</b></div>
              <div class="flex justify-between rounded-xl bg-white p-3"><span>سعيد علي</span><b class="text-[var(--alm-warning)]">50%</b></div>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'teacher', title:'لوحة تحكم الشيخ', subtitle:'إدارة الطلاب والدروس'});</script>
</body>
</html>
