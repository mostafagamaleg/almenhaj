<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإعدادات - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="settings">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in grid gap-5 xl:grid-cols-[1fr_360px]">
      <div class="alm-panel p-6">
        <h1 class="text-3xl font-black">إعدادات النظام</h1>
        <div class="mt-6 grid gap-4 md:grid-cols-2">
          <label><span class="text-sm font-bold">اسم الأكاديمية</span><input class="alm-input mt-2" value="أكاديمية المنهاج" /></label>
          <label><span class="text-sm font-bold">اللغة الافتراضية</span><select class="alm-input mt-2"><option>العربية RTL</option><option>English LTR</option></select></label>
          <label><span class="text-sm font-bold">نظام الشهادات</span><select class="alm-input mt-2"><option>مفعل مع QR</option><option>معطل</option></select></label>
          <label><span class="text-sm font-bold">قبول التسجيل</span><select class="alm-input mt-2"><option>بموافقة الإدارة</option><option>فوري</option></select></label>
        </div>
        <button class="alm-btn alm-btn-primary mt-6" data-toast="تم حفظ الإعدادات">حفظ الإعدادات</button>
      </div>
      <aside class="alm-panel p-5">
        <h2 class="text-xl font-black">الأدوار والصلاحيات</h2>
        <div class="mt-4 space-y-3">
          <div class="rounded-xl bg-white p-4"><b>Admin</b><p class="text-sm text-[var(--alm-muted)]">إدارة كاملة</p></div>
          <div class="rounded-xl bg-white p-4"><b>Teacher</b><p class="text-sm text-[var(--alm-muted)]">إدارة الدروس والطلاب</p></div>
          <div class="rounded-xl bg-white p-4"><b>Student</b><p class="text-sm text-[var(--alm-muted)]">التعلم والاختبارات</p></div>
        </div>
      </aside>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'settings', title:'الإعدادات', subtitle:'System Settings'});</script>
</body>
</html>
