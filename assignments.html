<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الواجبات - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="assignments">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in">
      <div class="alm-panel p-6">
        <div class="mb-6 flex items-center justify-between"><div><span class="alm-badge">Assignments</span><h1 class="mt-3 text-3xl font-black">واجبات التدبر والتطبيق</h1></div><button class="alm-btn alm-btn-primary" data-toast="تم حفظ إجاباتك">حفظ إجاباتي</button></div>
        <div class="space-y-4">
          <div class="alm-card grid gap-4 p-4 md:grid-cols-[60px_1fr]"><span class="grid h-12 w-12 place-items-center rounded-xl bg-[rgba(21,131,95,.10)] text-[var(--alm-green-800)]"><i data-lucide="heart-handshake"></i></span><label><b>ماذا أثر هذا الدرس فيك؟</b><textarea class="alm-input mt-2 min-h-24"></textarea></label></div>
          <div class="alm-card grid gap-4 p-4 md:grid-cols-[60px_1fr]"><span class="grid h-12 w-12 place-items-center rounded-xl bg-[rgba(21,131,95,.10)] text-[var(--alm-green-800)]"><i data-lucide="target"></i></span><label><b>ما السلوك الذي تريد تغييره بعد الدرس؟</b><textarea class="alm-input mt-2 min-h-24"></textarea></label></div>
          <div class="alm-card grid gap-4 p-4 md:grid-cols-[60px_1fr]"><span class="grid h-12 w-12 place-items-center rounded-xl bg-[rgba(197,154,69,.18)] text-[#7a5516]"><i data-lucide="clipboard-check"></i></span><label><b>اكتب تطبيقاً عملياً لهذا الأسبوع</b><textarea class="alm-input mt-2 min-h-24"></textarea></label></div>
        </div>
      </div>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'assignments', title:'الواجبات', subtitle:'تدبر وتطبيق'});</script>
</body>
</html>
