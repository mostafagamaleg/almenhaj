<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ PDF - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="pdf">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in grid gap-5 xl:grid-cols-[1fr_320px]">
      <div class="alm-panel p-5">
        <div class="mb-4 flex items-center justify-between"><h1 class="text-2xl font-black">ملخص تفسير سورة النبأ</h1><button class="alm-btn alm-btn-secondary"><i data-lucide="download"></i> تحميل</button></div>
        <div class="grid min-h-[620px] place-items-center rounded-2xl border border-[var(--alm-line)] bg-white p-8">
          <div class="max-w-xl text-center">
            <i data-lucide="file-text" class="mx-auto h-20 w-20 text-[var(--alm-gold-500)]"></i>
            <h2 class="mt-5 text-3xl font-black">PDF Reader Mockup</h2>
            <p class="mt-3 leading-8 text-[var(--alm-muted)]">منطقة عرض PDF احترافية لملخصات الدروس والكتب والمراجع داخل منصة المنهاج.</p>
          </div>
        </div>
      </div>
      <aside class="alm-panel p-5">
        <h2 class="font-black">الفهرس</h2>
        <div class="mt-4 space-y-2">
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">مقدمة</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">معاني الكلمات</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">فوائد تربوية</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">أسئلة مراجعة</button>
        </div>
      </aside>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'lesson', title:'قارئ PDF', subtitle:'PDF Reader'});</script>
</body>
</html>
