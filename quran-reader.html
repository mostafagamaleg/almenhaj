<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ القرآن - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="quran">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in grid gap-5 xl:grid-cols-[260px_1fr_300px]">
      <aside class="alm-panel p-4">
        <h2 class="font-black">السور</h2>
        <div class="mt-4 space-y-2">
          <button class="w-full rounded-xl bg-[rgba(197,154,69,.18)] p-3 text-start font-bold">78 سورة النبأ</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">79 النازعات</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">80 عبس</button>
          <button class="w-full rounded-xl bg-white p-3 text-start font-bold">67 الملك</button>
        </div>
      </aside>
      <article class="alm-panel p-6 md:p-10">
        <div class="rounded-2xl border border-[var(--alm-gold-500)]/30 bg-[var(--alm-cream-50)] p-8 text-center">
          <p class="font-quran text-3xl font-bold leading-loose">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
          <p class="mt-8 font-quran text-4xl font-bold leading-[2.4]">عَمَّ يَتَسَاءَلُونَ ۝ عَنِ النَّبَإِ الْعَظِيمِ ۝ الَّذِي هُمْ فِيهِ مُخْتَلِفُونَ ۝</p>
        </div>
        <div class="mt-5 flex flex-wrap gap-3">
          <button class="alm-btn alm-btn-secondary"><i data-lucide="volume-2"></i> استماع</button>
          <a class="alm-btn alm-btn-primary" href="tafsir-reader.html">فتح التفسير</a>
        </div>
      </article>
      <aside class="alm-panel p-5">
        <h2 class="font-black">أدوات القراءة</h2>
        <label class="mt-4 block text-sm font-bold">حجم الخط</label>
        <input class="mt-2 w-full" type="range" />
        <label class="mt-4 block text-sm font-bold">القارئ</label>
        <select class="alm-input mt-2"><option>الحصري</option><option>عبد الباسط</option></select>
        <button class="alm-btn alm-btn-primary mt-5 w-full" data-toast="تم حفظ موضع القراءة">حفظ الموضع</button>
      </aside>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'quran', title:'قارئ القرآن', subtitle:'Quran Reader'});</script>
</body>
</html>
