<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<body data-page="dashboard">
  <div class="alm-shell" data-layout="app"></div>

    <section class="alm-fade-in">

        <div class="alm-panel p-6">
          <h2 class="text-2xl font-black">نظرة عامة</h2>

            <a href="quiz.html" class="alm-card p-4"><b>اختبار جاهز</b><p class="mt-1 text-sm text-[var(--alm-muted)]">10 أسئلة</p></a>

        </div>
        <div class="alm-panel p-5">
          <h3 class="text-xl font-black">المتصدرون</h3>
          <div class="mt-4 space-y-3" data-leaderboard></div>
        </div>
      </div>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'student', title:'Dashboard', subtitle:'نظرة عامة على المنصة'});</script>

</html>
