<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الطالب - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="student">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in">
      <div class="mb-6 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <div class="alm-card p-5">
          <span class="text-sm font-bold text-[var(--alm-muted)]">التقدم العام</span>
          <div class="mt-4 flex items-center gap-4">
            <div class="alm-ring" style="--value:73"><span>73%</span></div>
            <div><b class="text-2xl">جزء عم</b><p class="mt-1 text-sm text-[var(--alm-muted)]">المستوى الحالي</p></div>
          </div>
        </div>
        <div data-stats class="contents"></div>
      </div>

      <div class="grid gap-5 xl:grid-cols-[1fr_360px]">
        <div class="space-y-5">
          <div class="alm-panel p-6">
            <div class="mb-5 flex items-center justify-between">
              <div><span class="alm-badge gold">Next Lesson</span><h2 class="mt-3 text-2xl font-black">سورة النبأ - الآيات 1-10</h2></div>
              <a class="alm-btn alm-btn-primary" href="lesson.html">متابعة الدرس</a>
            </div>
            <div class="grid gap-4 md:grid-cols-[1fr_280px]">
              <div class="alm-video">
                <span class="alm-play"><i data-lucide="play" class="h-9 w-9 fill-current"></i></span>
              </div>
              <div class="space-y-3">
                <div class="rounded-xl bg-white p-4"><b>الشيخ د. محمد الطيب</b><p class="mt-1 text-sm text-[var(--alm-muted)]">تفسير وتدبر سورة النبأ</p></div>
                <div class="rounded-xl bg-white p-4"><b>مدة الدرس</b><p class="mt-1 text-sm text-[var(--alm-muted)]">26:40 دقيقة</p></div>
                <div class="rounded-xl bg-white p-4"><b>الاختبار</b><p class="mt-1 text-sm text-[var(--alm-muted)]">10 أسئلة بعد المشاهدة</p></div>
              </div>
            </div>
          </div>

          <div class="alm-panel p-6">
            <div class="mb-5 flex items-center justify-between">
              <h2 class="text-2xl font-black">مساراتك الحالية</h2>
              <a class="alm-btn alm-btn-secondary" href="course.html">عرض الكل</a>
            </div>
            <div data-courses class="grid gap-4 md:grid-cols-2 xl:grid-cols-3"></div>
          </div>
        </div>

        <aside class="space-y-5">
          <div class="alm-panel p-5">
            <h3 class="text-xl font-black">الرحلة القرآنية</h3>
            <div class="relative mt-5 space-y-4 pr-12 before:absolute before:right-4 before:top-6 before:h-[calc(100%-3rem)] before:w-1 before:rounded-full before:bg-gradient-to-b before:from-[var(--alm-green-700)] before:to-[var(--alm-gold-500)]">
              <div class="relative rounded-xl bg-white p-4"><span class="absolute -right-10 top-4 grid h-8 w-8 place-items-center rounded-full bg-[var(--alm-green-800)] text-white">1</span><b>الثلاثة أجزاء الأولى</b><p class="text-sm text-[var(--alm-muted)]">مكتملة</p></div>
              <div class="relative rounded-xl bg-[rgba(197,154,69,.18)] p-4"><span class="absolute -right-10 top-4 grid h-8 w-8 place-items-center rounded-full bg-[var(--alm-gold-500)] text-[var(--alm-green-950)]">2</span><b>جزء عم</b><p class="text-sm text-[var(--alm-muted)]">قيد التعلم</p></div>
              <div class="relative rounded-xl bg-white p-4"><span class="absolute -right-10 top-4 grid h-8 w-8 place-items-center rounded-full bg-[var(--alm-green-800)] text-white">3</span><b>ربع القرآن</b><p class="text-sm text-[var(--alm-muted)]">مغلق حتى الإتمام</p></div>
            </div>
          </div>
          <div class="alm-panel p-5">
            <h3 class="text-xl font-black">النشاط الأخير</h3>
            <div data-activity class="mt-5 space-y-4"></div>
          </div>
        </aside>
      </div>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'student', title:'لوحة تحكم الطالب', subtitle:'رحلتك القرآنية'});</script>
</body>
</html>
