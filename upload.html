<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رفع درس جديد - المنهاج</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;500;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-page="teacher">
  <div class="alm-shell" data-layout="app"></div>
  <template data-page-content>
    <section class="alm-fade-in grid gap-5 xl:grid-cols-[1fr_360px]">
      <div class="space-y-5">
        <div class="alm-panel p-6">
          <div class="flex flex-col justify-between gap-3 md:flex-row md:items-start">
            <div><span class="alm-badge gold">Upload Center</span><h1 class="mt-3 text-3xl font-black">رفع درس جديد</h1><p class="mt-2 text-[var(--alm-muted)]">ارفع فيديو الشرح والملفات المرفقة، عاينها قبل النشر، ثم انشر الدرس للطلاب.</p></div>
            <a class="alm-btn alm-btn-secondary" href="teacher.html"><i data-lucide="arrow-right" class="h-5 w-5"></i> رجوع للوحة</a>
          </div>
          <div class="mt-6 grid gap-4 md:grid-cols-2">
            <label class="block"><span class="mb-1 block text-sm font-bold">عنوان الدرس</span><input class="alm-input" placeholder="مثال: تفسير سورة النبأ — الآيات 1-10" /></label>
            <label class="block"><span class="mb-1 block text-sm font-bold">السورة / المسار</span>
              <select class="alm-input"><option>تفسير جزء عم</option><option>تفسير جزء تبارك</option><option>سورة الملك</option></select></label>
            <label class="block md:col-span-2"><span class="mb-1 block text-sm font-bold">وصف مختصر</span><textarea class="alm-input min-h-24" placeholder="نبذة عن محتوى الدرس وأهدافه..."></textarea></label>
          </div>
        </div>

        <div class="alm-panel p-6">
          <h2 class="mb-4 text-2xl font-black">الملفات والفيديوهات</h2>
          <div data-uploader></div>
        </div>
      </div>

      <aside class="space-y-5">
        <div class="alm-panel p-5">
          <h3 class="text-xl font-black">إرشادات الرفع</h3>
          <ul class="mt-4 space-y-3 text-sm text-[var(--alm-muted)]">
            <li class="flex gap-2"><i data-lucide="check" class="h-5 w-5 text-[var(--alm-success)]"></i> صيغة الفيديو المفضّلة MP4 بدقة 720p أو أعلى.</li>
            <li class="flex gap-2"><i data-lucide="check" class="h-5 w-5 text-[var(--alm-success)]"></i> حجم الفيديو حتى 500MB، والـPDF حتى 50MB.</li>
            <li class="flex gap-2"><i data-lucide="check" class="h-5 w-5 text-[var(--alm-success)]"></i> أرفق ملخص PDF وخريطة ذهنية لتعزيز الفهم.</li>
            <li class="flex gap-2"><i data-lucide="check" class="h-5 w-5 text-[var(--alm-success)]"></i> يمكنك سحب عدة ملفات دفعة واحدة.</li>
          </ul>
        </div>
        <div class="alm-panel p-5">
          <h3 class="text-xl font-black">حالة النشر</h3>
          <div class="mt-4 space-y-3 text-sm">
            <div class="flex items-center justify-between rounded-xl bg-white p-3"><span>الحفظ كمسودة</span><span class="alm-badge">تلقائي</span></div>
            <div class="flex items-center justify-between rounded-xl bg-white p-3"><span>مراجعة الإدارة</span><span class="alm-badge gold">قبل النشر</span></div>
          </div>
          <button class="alm-btn alm-btn-secondary mt-4 w-full justify-center" data-toast="تم حفظ الدرس كمسودة"><i data-lucide="save" class="h-5 w-5"></i> حفظ كمسودة</button>
        </div>
      </aside>
    </section>
  </template>
  <script src="js/data.js"></script><script src="js/app.js"></script><script src="js/navigation.js"></script>
  <script>Alminhaj.initPage({active:'teacher', title:'رفع درس جديد', subtitle:'مركز رفع الدروس'});</script>
</body>
</html>
